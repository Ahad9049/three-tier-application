apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: backend
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend  
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers: 
        - name: backend
          image: abdulahad9049/backend-mern:v1
          ports:
            - containerPort: 5000
            env:
            - name: MONGO_URI
              valueFrom:
                secretkeyref:
                  name: mongo-secret
                  key: MONGO_URI 

